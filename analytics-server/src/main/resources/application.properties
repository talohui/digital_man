server.port=5002

# H2 file 模式：数据持久化到 ./lingshan-analytics.mv.db
spring.datasource.url=jdbc:h2:file:./lingshan-analytics;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA：自动建表，不删已有数据
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 控制台（调试用：访问 http://127.0.0.1:5002/h2-console）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# 情感分析提供商：keyword（当前）| qwen（后续替换）
sentiment.provider=keyword
